<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HeatSync | Sensor Command</title>
    <link rel="stylesheet" href="./dist/output.css" />
    <script src="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.js"></script>
    <link
      href="https://unpkg.com/maplibre-gl@3.x/dist/maplibre-gl.css"
      rel="stylesheet"
    />

    <link rel="icon" type="image/png" href="HeatSynclogo.png" />

    <link rel="shortcut icon" href="~/favicon.ico" type="image/x-icon" />

    <link rel="stylesheet" href="mapUI.css" />
    <script src="config.js"></script>
  </head>
  <body class="h-screen overflow-hidden flex flex-col md:flex-row bg-[#020617]">
    <header
      class="absolute top-0 left-0 right-0 z-30 p-4 pointer-events-none md:hidden"
    >
      <div class="flex items-center justify-between max-w-full">
        <div
          class="pointer-events-auto bg-slate-950/90 backdrop-blur-md p-3 rounded-lg border border-slate-800/50"
        >
          <h1 class="text-sm font-bold tracking-[0.2em] text-white">
            HEAT<span class="text-orange-500">SYNC</span>
          </h1>
          <p
            class="text-[8px] text-blue-500/80 font-bold uppercase tracking-widest"
          >
            Grid v3.0
          </p>
        </div>

        <a
          href="https://t.me/MyHeatMonitorBot"
          target="_blank"
          class="pointer-events-auto bg-[#229ED9] text-white text-[10px] font-bold px-4 py-2 rounded-full flex items-center gap-2 shadow-lg border border-white/10"
        >
          <span>✈️</span> BOT
        </a>
      </div>
    </header>

    <aside
      id="mainDrawer"
      class="absolute bottom-0 left-0 right-0 md:relative md:w-[420px] bg-[#030712]/95 md:bg-[#030712] border-t md:border-t-0 md:border-r border-white/5 flex flex-col h-[40vh] md:h-full z-20 backdrop-blur-lg md:backdrop-blur-none transition-all duration-300"
    >
      <div
        class="md:hidden w-full py-3 cursor-pointer"
        onclick="toggleDrawer()"
      >
        <div class="w-10 h-1 bg-white/10 rounded-full mx-auto"></div>
      </div>

      <div class="hidden md:block p-6 border-b border-white/5 bg-white/[0.02]">
        <div class="flex items-center justify-between mb-2">
          <div>
            <h1
              class="text-xl font-black tracking-tighter text-white uppercase"
            >
              HEALER<span class="text-[#f24e1e]">TSYS</span>
            </h1>
            <p
              class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em] mt-1"
            >
              Grid Command v3.0
            </p>
          </div>
          <a
            href="https://t.me/MyHeatMonitorBot"
            target="_blank"
            class="bg-white/5 hover:bg-[#f24e1e]/10 text-slate-300 hover:text-[#f24e1e] text-[9px] font-black px-3 py-1.5 rounded border border-white/10 hover:border-[#f24e1e]/30 transition-all uppercase tracking-widest"
          >
            Bot Link
          </a>
        </div>
      </div>

      <div
        class="p-4 md:p-6 border-b border-white/5 bg-white/[0.01] cursor-pointer md:cursor-default"
        onclick="toggleDrawer()"
      >
        <div class="flex items-center justify-between mb-4">
          <div
            class="text-[10px] text-slate-500 font-mono uppercase tracking-widest"
          >
            Grid Status
          </div>
          <span
            id="sync-status"
            class="text-[10px] font-bold bg-[#f24e1e]/10 text-[#f24e1e] px-2 py-0.5 rounded border border-[#f24e1e]/20"
          >
            READY
          </span>
        </div>

        <button
          onclick="
            event.stopPropagation();
            syncData(true);
          "
          class="w-full bg-[#f24e1e] hover:bg-[#f24e1e]/90 text-white text-[11px] font-black p-3 rounded transition-all flex items-center justify-center gap-3 shadow-lg shadow-[#f24e1e]/10 uppercase tracking-widest"
        >
          <span id="sync-icon">📡</span> Sync Synthetic Data
        </button>
      </div>

      <div class="px-4 py-3 bg-black/20 border-b border-white/5">
        <div class="relative">
          <i
            data-lucide="search"
            class="absolute left-3 top-2.5 w-4 h-4 text-slate-600"
          ></i>
          <input
            type="text"
            id="brgySearch"
            placeholder="Search Barangay..."
            class="w-full bg-slate-950 border border-white/5 rounded py-2 pl-9 pr-4 text-[11px] font-mono text-slate-300 focus:outline-none focus:border-[#f24e1e]/50 transition-all placeholder:text-slate-700 uppercase"
          />
        </div>
      </div>

      <div
        class="flex-grow overflow-y-auto custom-scroll p-4 space-y-3"
        id="sensorList"
      ></div>

      <div class="p-4 bg-black border-t border-white/5 flex flex-col gap-3">
        <div class="text-[9px] flex justify-between font-mono tracking-tight">
          <span id="active-sensor-code" class="text-slate-500 uppercase"
            >NODE: SIM_ENV</span
          >
          <span id="last-ping" class="text-[#f24e1e] font-bold"
            >LATENCY: --</span
          >
        </div>

        <div class="hidden md:block pt-3 border-t border-white/5">
          <button
            onclick="handleLogout()"
            class="w-full flex items-center justify-center px-2 py-2 rounded bg-white/5 hover:bg-red-500/10 transition-colors text-slate-600 hover:text-red-500 border border-transparent hover:border-red-500/20"
          >
            <span class="text-[9px] font-black uppercase tracking-[0.2em]">
              Admin Session</span
            >
          </button>
        </div>
      </div>
    </aside>

    <main class="flex-grow relative bg-[#010409] h-full">
      <div id="map" class="w-full h-full opacity-80"></div>
      <div
        class="absolute inset-0 pointer-events-none shadow-[inset_0_0_150px_rgba(0,0,0,0.9)] border-[10px] md:border-[20px] border-black/10"
      ></div>
    </main>

    <script src="mapUI.js"></script>
  </body>
</html>
